<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root">
      <div id="loading-indicator" style="background: #0f172a; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: sans-serif;">
        <div style="font-size: 24px; font-weight: 800; letter-spacing: 0.1em; color: #6366f1;">UCC LANCERS</div>
        <div style="margin-top: 10px; opacity: 0.5; font-size: 14px;">Loading Dashboard...</div>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
    <script>
      // Failsafe: if the dashboard hasn't loaded in 5 seconds, show a troubleshooting tip
      setTimeout(() => {
        const root = document.getElementById('root');
        // Check if the loading div is still present
        const loadingIndicator = document.getElementById('loading-indicator');
        if (loadingIndicator) {
          const tip = document.createElement('div');
          tip.style.marginTop = '20px';
          tip.style.padding = '15px';
          tip.style.background = '#1e293b';
          tip.style.borderRadius = '12px';
          tip.style.fontSize = '12px';
          tip.style.maxWidth = '300px';
          tip.style.textAlign = 'center';
          tip.style.color = '#94a3b8';
          tip.style.border = '1px solid #334155';
          tip.innerHTML = '<b>Setup Required?</b> This usually happens if the site hasn\'t been <b>Built</b> yet. Ensure you run <code>npm run build</code> and deploy the contents of the <code>dist</code> folder, not the source files.';
          loadingIndicator.appendChild(tip);
        }
      }, 5000);
    </script>
  </body>
</html>
